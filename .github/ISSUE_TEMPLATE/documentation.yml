name: Documentation issue
description: Report stale, unclear, misplaced, or missing documentation.
title: "[docs] "
labels: ["documentation"]
body:
  - type: textarea
    id: location
    attributes:
      label: Location
      description: File path or section.
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What is incorrect, unclear, or missing?
    validations:
      required: true
  - type: textarea
    id: proposed
    attributes:
      label: Proposed change
      description: What should change?
